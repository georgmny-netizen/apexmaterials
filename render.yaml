services:
  # PostgreSQL Database
  - type: pserv
    name: apexmaterials-db
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile.postgres
    disk:
      name: apexmaterials-pgdata
      mountPath: /var/lib/postgresql/data
      sizeGB: 1

  # FastAPI Backend
  - type: web
    name: apexmaterials-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash prestart.sh && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apexmaterials-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: ApexMaterials RFQ API
      - key: API_PREFIX
        value: /api/v1
    healthCheckPath: /health

  # Static Website
  - type: web
    name: apexmaterials-frontend
    env: static
    buildCommand: echo "No build required"
    staticPublishPath: ./website
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
